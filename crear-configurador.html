<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Configurador de mezcla — Instone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:transparent;color:#1A1A18;-webkit-font-smoothing:antialiased}
.app{padding:28px 0 72px}

.hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px}
.hdr h1{font-size:20px;font-weight:700;letter-spacing:-.01em}
.hdr .sub{font-size:13px;color:#9b958a;margin-top:3px}
.count-badge{display:inline-flex;align-items:center;font-size:12px;font-weight:600;letter-spacing:.04em;padding:5px 13px;border-radius:100px;background:#EFEBE3;color:#6a6460;white-space:nowrap;flex:none;margin-top:2px}

.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:26px}
.filter-btn{font-family:inherit;font-size:13px;font-weight:500;padding:8px 17px;border-radius:100px;cursor:pointer;border:1px solid #D7D1C6;background:transparent;color:#3a3733;transition:all .15s}
.filter-btn.active{background:#1A1A18;color:#fff;border-color:#1A1A18;font-weight:600}
.filter-btn:not(.active):hover{background:#F3F0EA}

.gallery{columns:3;column-gap:14px;margin-bottom:10px}
@media(max-width:720px){.gallery{columns:2}}
@media(max-width:440px){.gallery{columns:1}}

.mix-card{break-inside:avoid;margin-bottom:14px;display:inline-block;width:100%;cursor:pointer}
.mix-card-inner{border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.09);transition:transform .22s,box-shadow .22s;background:#f2efe9;position:relative}
.mix-card:hover .mix-card-inner{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.14)}
.mix-card.selected .mix-card-inner{transform:translateY(-3px);box-shadow:0 0 0 2.5px #1A1A18,0 12px 30px rgba(0,0,0,.14)}
.mix-card canvas{display:block;width:100%;height:auto}
.mix-card-save{position:absolute;top:10px;right:10px;opacity:0;transition:opacity .18s;background:#E0491A;color:#fff;border:none;border-radius:100px;font-family:inherit;font-size:11px;font-weight:700;padding:6px 12px;cursor:pointer}
.mix-card:hover .mix-card-save{opacity:1}
.mix-card-lbl{padding:9px 11px 11px}
.mix-card-lbl .code{font-size:12px;font-weight:700;color:#1A1A18}
.mix-card-lbl .tono{font-size:11px;color:#9b958a;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* detail */
.detail{border-radius:20px;background:#F7F4EF;border:1px solid #ECE8E0;overflow:hidden;margin-top:4px;display:none}
.detail.open{display:block}
.detail-grid{display:grid;grid-template-columns:320px 1fr;min-height:340px}
@media(max-width:700px){.detail-grid{grid-template-columns:1fr}}
.d-canvas-wrap{background:#fff;flex:none}
.d-canvas-wrap canvas{display:block;width:100%;height:100%;object-fit:cover}
.d-info{padding:26px 28px;display:flex;flex-direction:column;gap:16px;overflow:auto}

.line-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:100px;background:#EFEBE3;color:#6a6460}
.d-code{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-top:8px}
.d-tono{font-size:13px;color:#9b958a;margin-top:1px}
.d-desc{font-size:13px;line-height:1.65;color:#3a3733}

.section-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9b958a;margin-bottom:9px}
.chip-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #ECE8E0}
.chip-row:last-child{border-bottom:none}
.chip-swatch{width:30px;height:30px;border-radius:50%;flex:none;border:1px solid rgba(0,0,0,.08)}
.chip-main{flex:1;min-width:0}
.chip-name{font-size:13px;font-weight:600;color:#1A1A18}
.chip-var{font-size:11px;color:#9b958a;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip-pct{font-size:14px;font-weight:700;color:#1A1A18;flex:none}
.chip-sz{font-size:10px;color:#9b958a;flex:none;min-width:48px;text-align:right}

.mat-row{display:flex;align-items:center;gap:12px}
.mat-swatch{width:34px;height:34px;border-radius:9px;flex:none;border:1px solid rgba(0,0,0,.07)}
.mat-name{font-size:13px;font-weight:600;color:#1A1A18}
.mat-sub{font-size:11px;color:#9b958a;margin-top:2px}

.d-actions{display:flex;gap:10px;margin-top:auto;padding-top:4px}
.btn-p{font-family:inherit;font-size:14px;font-weight:700;padding:13px 22px;border-radius:100px;border:none;background:#1A1A18;color:#fff;cursor:pointer;flex:1;transition:background .15s}
.btn-p:hover{background:#333}
.btn-s{font-family:inherit;font-size:14px;font-weight:600;padding:13px 18px;border-radius:100px;border:1.5px solid #D7D1C6;background:transparent;color:#1A1A18;cursor:pointer;transition:background .15s}
.btn-s:hover{background:#F3F0EA}

.loading-state{text-align:center;padding:56px 0;color:#9b958a;font-size:14px}
.error-state{text-align:center;padding:48px 24px;color:#c0392b;font-size:13px;background:#fff5f5;border-radius:12px;margin:16px 0}

/* toast */
#cfg-toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(12px);background:#1A1A18;color:#fff;padding:10px 20px;border-radius:100px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:1000;white-space:nowrap}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div>
      <h1>Configurador de mezcla</h1>
      <p class="sub">Seleccioná una mezcla real para ver su composición, origen y pedirla</p>
    </div>
    <span class="count-badge" id="count-badge">…</span>
  </div>

  <div class="filters" id="filters"></div>
  <div id="loading" class="loading-state">Cargando mezclas…</div>
  <div id="error" class="error-state" style="display:none"></div>
  <div class="gallery" id="gallery"></div>
  <div class="detail" id="detail"></div>
</div>

<div id="cfg-toast"></div>

        "color_predominante_hex":"#484038",
        "descripcion":           "Chips de latón dorado (35%) sobre negro dominante (65%) con base gris oscura. Terrazzo metálico premium — look hotelería y espacios contract de alta gama.",

<script>
'use strict';

// ── Math / noise helpers ──────────────────────────────────────────────────
const h2r = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const hash2 = (x,y) => Math.abs(Math.sin(x*127.1+y*311.7)*43758.5453)%1;
const vnoise = (x,y) => {
  const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;
  const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);
  const a=hash2(ix,iy),b=hash2(ix+1,iy),c=hash2(ix,iy+1),d=hash2(ix+1,iy+1);
  return(a+(b-a)*ux)+(c-a+(a-b-c+d)*ux)*uy;
};
const fbm = (x,y,o) => {
  let v=0,a=.5,f=1;
  for(let i=0;i<o;i++){v+=vnoise(x*f,y*f)*a;a*=.5;f*=2.1;}
  return v;
};
const angularPath = (ctx,cx,cy,rx,ry,seed) => {
  const sides = Math.floor(4+hash2(seed,seed*1.3)*4);
  const ba = hash2(seed*2.1,seed*.7)*Math.PI*2;
  const pts = [];
  for(let i=0;i<sides;i++){
    const t=i/sides;
    const ang=ba+t*Math.PI*2+(hash2(seed+i*.37,seed*1.9+i)-.5)*(Math.PI*2/sides)*0.6;
    const rf=0.55+Math.random()*0.45;
    pts.push([cx+Math.cos(ang)*rx*rf, cy+Math.sin(ang)*ry*rf]);
  }
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.closePath();
};
const roundedPath = (ctx,cx,cy,rx,ry,seed) => {
  const angle = hash2(seed*1.31,seed*0.73)*Math.PI;
  const scx = 0.82+hash2(seed*2.1,seed*0.41)*0.18;
  const scy = 0.72+hash2(seed*0.9,seed*1.83)*0.18;
  ctx.beginPath();
  ctx.ellipse(cx,cy,rx*scx,ry*scy,angle,0,Math.PI*2);
};

// Granulometría → radio en píxeles en canvas
const GRAN_PX = {
  '0_1': {min:2,  max:4},
  '0_5': {min:2,  max:6},
  '1':   {min:4,  max:10},   // N.1 · 3–6mm
  '2':   {min:9,  max:18},   // N.2 · 6–10mm
  '3':   {min:15, max:30},   // N.3 · 10–20mm  ← Serie Premium
  '5':   {min:26, max:46}    // N.5 · 20–30mm
};

// ── Placer de chips (sin overlap) ─────────────────────────────────────────
function makePlacer(W,H) {
  const cell=26, gw=Math.ceil(W/cell), gh=Math.ceil(H/cell);
  const grid=Array.from({length:gw*gh},()=>[]);
  const gcells=(x,y,r)=>{
    const x1=Math.max(0,Math.floor((x-r)/cell)),x2=Math.min(gw-1,Math.floor((x+r)/cell));
    const y1=Math.max(0,Math.floor((y-r)/cell)),y2=Math.min(gh-1,Math.floor((y+r)/cell));
    const out=[];
    for(let gx=x1;gx<=x2;gx++) for(let gy=y1;gy<=y2;gy++) out.push(gx+gy*gw);
    return out;
  };
  return {
    overlaps(x,y,r){
      for(const c of gcells(x,y,r)) for(const p of grid[c]){
        const dx=p.x-x,dy=p.y-y,md=p.r+r+1.5;
        if(dx*dx+dy*dy<md*md) return true;
      }
      return false;
    },
    add(x,y,r){ for(const c of gcells(x,y,r)) grid[c].push({x,y,r}); }
  };
}

// ── Render principal ──────────────────────────────────────────────────────
function renderMezcla(canvas, mezcla, W, H) {
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');

  // Matriz de cemento con grain noise
  const matHex = mezcla.visual.color_matriz_hex || '#E8E4DC';
  const [br,bg,bb] = h2r(matHex);
  const id = ctx.createImageData(W,H); const d=id.data; const sc=0.007;
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    const n=fbm(x*sc,y*sc,5), n2=fbm(x*sc*4+30,y*sc*4+70,3);
    const grain=(hash2(x*.7+5,y*1.1+9)-.5)*10;
    const g=(n-.5)*18+(n2-.5)*8+grain, i=(y*W+x)*4;
    d[i]=clamp(br+g,0,255); d[i+1]=clamp(bg+g,0,255); d[i+2]=clamp(bb+g,0,255); d[i+3]=255;
  }
  ctx.putImageData(id,0,0);

  // Chips: solo los que tienen proporción definida
  const chips=(mezcla.chips||[]).filter(c=>c.proporcion>0);
  if(!chips.length) return;

  const totalProp=chips.reduce((s,c)=>s+c.proporcion,0);
  const totalArea=W*H*0.82;

  // Calcular cuántos chips de cada tipo
  const specs=chips.map(c=>{
    const sp=GRAN_PX[c.granulometria_key]||GRAN_PX['1'];
    const avgR=(sp.min+sp.max)/2;
    const count=Math.max(1,Math.round(totalArea*(c.proporcion/totalProp)/(Math.PI*avgR*avgR*0.65)));
    return{c,sp,count};
  }).sort((a,b)=>b.sp.max-a.sp.max);

  // Colocar chips sin overlap, los más grandes primero
  const placer=makePlacer(W,H); const all=[];
  specs.forEach(({c,sp,count},si)=>{
    let placed=0;
    for(let i=0;i<count*28&&placed<count;i++){
      const rx=sp.min+Math.random()*(sp.max-sp.min);
      const ry=rx*(0.55+Math.random()*0.7);
      const md=Math.max(rx,ry); const pad=md+1;
      if(pad*2>=Math.min(W,H)) continue;
      const x=pad+Math.random()*(W-pad*2);
      const y=pad+Math.random()*(H-pad*2);
      if(!placer.overlaps(x,y,md*0.76)){
        placer.add(x,y,md*0.76);
        all.push({x,y,rx,ry,r:md,chip:c,seed:hash2(x*.01+si*10,y*.01+placed*.07)*200});
        placed++;
      }
    }
  });

  // Dibujar de mayor a menor (grandes debajo)
  all.sort((a,b)=>b.r-a.r);
  all.forEach(p=>{
    const [r,g,b2]=h2r(p.chip.color_hex||'#ccc');
    const isGlass=p.chip.translucido||p.chip.piedra_id==='vidrio';
    const isRodada=p.chip.rodada||p.chip.piedra_id==='blanca_rodada';
    const chipPath=(cx,cy,rx,ry,seed)=>isRodada?roundedPath(ctx,cx,cy,rx,ry,seed):angularPath(ctx,cx,cy,rx,ry,seed);

    // Fill
    chipPath(p.x,p.y,p.rx,p.ry,p.seed);
    ctx.fillStyle=isGlass?`rgba(${r},${g},${b2},0.52)`:`rgb(${r},${g},${b2})`;
    ctx.fill();

    // Borde
    ctx.lineWidth=1; ctx.strokeStyle='rgba(0,0,0,.10)'; ctx.stroke();

    // Gradiente de luz
    const hl=ctx.createLinearGradient(p.x-p.rx,p.y-p.ry,p.x+p.rx,p.y+p.ry);
    hl.addColorStop(0,'rgba(255,255,255,.30)');
    hl.addColorStop(.42,'rgba(255,255,255,0)');
    hl.addColorStop(1,'rgba(0,0,0,.07)');
    chipPath(p.x,p.y,p.rx,p.ry,p.seed);
    ctx.fillStyle=hl; ctx.fill();

    // Destellos extra en vidrio
    if(isGlass){
      angularPath(ctx,p.x-p.rx*.2,p.y-p.ry*.2,p.rx*.38,p.ry*.38,p.seed+50);
      ctx.fillStyle='rgba(255,255,255,.28)'; ctx.fill();
    }
  });

  // Marmolina micro (partículas muy finas del fondo)
  const micro=Math.round(W*H*0.0014);
  for(let i=0;i<micro;i++){
    let pick=Math.random()*totalProp,sel=chips[0];
    for(const c of chips){pick-=c.proporcion;if(pick<=0){sel=c;break;}}
    const [r,g,b2]=h2r(sel.color_hex||'#aaa');
    const cv2=(Math.random()-.5)*18, rr=0.6+Math.random()*1.8;
    angularPath(ctx,Math.random()*W,Math.random()*H,rr,rr*(0.7+Math.random()*.6),Math.random()*200);
    ctx.fillStyle=`rgba(${clamp(r+cv2,0,255)},${clamp(g+cv2,0,255)},${clamp(b2+cv2,0,255)},${0.38+Math.random()*.35})`;
    ctx.fill();
  }

  // Brillo superficial (simula pulido)
  const sh=ctx.createRadialGradient(W*.36,H*.28,0,W*.44,H*.44,Math.max(W,H)*.9);
  sh.addColorStop(0,'rgba(255,255,255,0.06)'); sh.addColorStop(1,'rgba(0,0,0,0.04)');
  ctx.fillStyle=sh; ctx.fillRect(0,0,W,H);
}

// ── Etiquetas ─────────────────────────────────────────────────────────────
const LINEA_LABEL = {
  'instone_premium':    'Premium',
  'blangino_terrazzo':  'Blangino Terrazzo',
  'blangino_compact':   'Blangino Compact'
};
const GRAN_LABEL = {
  '0_1': 'micro',     '0_5': 'micro fino',
  '1':   'N.1 · 3–6mm',  '2': 'N.2 · 6–10mm',
  '3':   'N.3 · 10–20mm','5': 'N.5 · 20–30mm'
};
const CEMENTO_LABEL = {'blanco':'Cemento Portland blanco','gris':'Cemento Portland gris'};

// ── Estado ────────────────────────────────────────────────────────────────
let ALL=[], activeFilter='Todas', selectedId=null;

// ── Toast ─────────────────────────────────────────────────────────────────
let toastT;
function toast(msg){
  const t=document.getElementById('cfg-toast');
  t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(toastT);toastT=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(12px)';},2600);
}

// ── postMessage altura al padre ───────────────────────────────────────────
function postHeight(){
  try{window.parent.postMessage({crearHeight:document.documentElement.scrollHeight+16},'*');}catch(_){}
}

// ── Card ──────────────────────────────────────────────────────────────────
function buildCard(m){
  const wrap=document.createElement('div');
  wrap.className='mix-card';
  wrap.setAttribute('data-id',m.id);

  const inner=document.createElement('div');
  inner.className='mix-card-inner';

  // Canvas pequeño
  const cv=document.createElement('canvas');
  renderMezcla(cv,m,220,182);
  inner.appendChild(cv);

  // Botón guardar
  const sav=document.createElement('button');
  sav.className='mix-card-save';sav.textContent='Guardar';
  sav.addEventListener('click',e=>{e.stopPropagation();toast('Guardado · '+m.codigo);});
  inner.appendChild(sav);

  // Label
  const lbl=document.createElement('div');
  lbl.className='mix-card-lbl';
  lbl.innerHTML=`<div class="code">${m.codigo}</div><div class="tono">${m.visual.tono}</div>`;
  inner.appendChild(lbl);

  wrap.appendChild(inner);
  wrap.addEventListener('click',()=>selectMix(m.id));
  return wrap;
}

// ── Panel de detalle ──────────────────────────────────────────────────────
function buildDetail(m){
  const det=document.getElementById('detail');
  det.innerHTML=''; det.className='detail open';

  const grid=document.createElement('div');
  grid.className='detail-grid';

  // Canvas grande
  const cvWrap=document.createElement('div');
  cvWrap.className='d-canvas-wrap';
  const cv=document.createElement('canvas');
  renderMezcla(cv,m,400,360);
  cv.style.cssText='display:block;width:100%;height:100%;min-height:300px;object-fit:cover';
  cvWrap.appendChild(cv);
  grid.appendChild(cvWrap);

  // Info
  const info=document.createElement('div');
  info.className='d-info';

  // Header
  const hd=document.createElement('div');
  hd.innerHTML=`
    <span class="line-tag">${LINEA_LABEL[m.linea]||m.linea}</span>
    <div class="d-code">${m.codigo}</div>
    <div class="d-tono">${m.visual.tono}</div>
  `;
  info.appendChild(hd);

  // Descripción
  if(m.visual.descripcion){
    const p=document.createElement('p');
    p.className='d-desc'; p.textContent=m.visual.descripcion;
    info.appendChild(p);
  }

  // Chips
  const chips=(m.chips||[]).filter(c=>c.proporcion>0);
  if(chips.length){
    const cw=document.createElement('div');
    cw.innerHTML=`<div class="section-lbl">Composición del agregado</div>`;
    chips.forEach(c=>{
      const row=document.createElement('div');
      row.className='chip-row';
      const gran=c.granulometria_key?(GRAN_LABEL[c.granulometria_key]||c.granulometria_key):'—';
      const pctStr=c.pct_en_agregado!=null?c.pct_en_agregado+'%':'~';
      const varStr=c.variedad||'';
      const isGlass=c.piedra_id==='vidrio';
      const isRodadaChip=c.rodada||c.piedra_id==='blanca_rodada';
      row.innerHTML=`
        <div class="chip-swatch" style="background:${c.color_hex||'#ccc'};${isGlass?'opacity:.65;border:2px dashed rgba(0,0,0,.15)':''}${isRodadaChip?'box-shadow:inset 0 1px 4px rgba(255,255,255,.5),0 1px 3px rgba(0,0,0,.12);':''}"></div>
        <div class="chip-main">
          <div class="chip-name">${c.nombre_piedra||c.piedra_id}</div>
          <div class="chip-var">${varStr}</div>
        </div>
        <div class="chip-pct">${pctStr}</div>
        <div class="chip-sz">${gran}</div>
      `;
      cw.appendChild(row);
    });
    info.appendChild(cw);
  } else if(m.chips&&m.chips.length){
    // chips artesanales sin proporción fija
    const cw=document.createElement('div');
    cw.innerHTML=`<div class="section-lbl">Composición del agregado</div>`;
    m.chips.forEach(c=>{
      const row=document.createElement('div');
      row.className='chip-row';
      const gran=c.granulometria_key?(GRAN_LABEL[c.granulometria_key]||c.granulometria_key):'—';
      row.innerHTML=`
        <div class="chip-swatch" style="background:${c.color_hex||'#ccc'}"></div>
        <div class="chip-main">
          <div class="chip-name">${c.nombre_piedra||c.piedra_id}</div>
          <div class="chip-var">${c.nota||c.variedad||''}</div>
        </div>
        <div class="chip-pct">—</div>
        <div class="chip-sz">${gran}</div>
      `;
      cw.appendChild(row);
    });
    info.appendChild(cw);
  }

  // Matriz / cemento
  const fab=m.fabricacion;
  if(fab){
    const pigLabel=fab.pigmento_id?` + pigmento ${fab.pigmento_id.replace(/_/g,' ')} ${fab.pigmento_pct}%`:'';
    const mw=document.createElement('div');
    mw.innerHTML=`
      <div class="section-lbl">Matriz</div>
      <div class="mat-row">
        <div class="mat-swatch" style="background:${m.visual.color_matriz_hex||'#E8E4DC'}"></div>
        <div>
          <div class="mat-name">${CEMENTO_LABEL[fab.cemento]||fab.cemento}${pigLabel}</div>
          <div class="mat-sub">Rel. cemento / agregado ${fab.relacion_cemento_agregado||'50/50'}${fab.plastificante_pct?` · plastificante ${fab.plastificante_pct}%`:''}</div>
        </div>
      </div>
    `;
    info.appendChild(mw);
  }

  // Acciones
  const ac=document.createElement('div');
  ac.className='d-actions';
  ac.innerHTML=`
    <button class="btn-s" id="det-close">Cerrar</button>
    <button class="btn-p" id="det-cotizar">Cotizar esta mezcla →</button>
  `;
  info.appendChild(ac);

  grid.appendChild(info);
  det.appendChild(grid);

  det.querySelector('#det-close').addEventListener('click',closeDetail);
  det.querySelector('#det-cotizar').addEventListener('click',()=>{
    try{window.parent.postMessage({action:'cotizar',mezcla:m.codigo},'*');}catch(_){}
    toast('Solicitud enviada para mezcla '+m.codigo+' · El equipo de Instone te contactará');
  });

  setTimeout(()=>{det.scrollIntoView({behavior:'smooth',block:'nearest'});setTimeout(postHeight,350);},40);
}

function closeDetail(){
  document.getElementById('detail').className='detail';
  if(selectedId){
    const c=document.querySelector(`.mix-card[data-id="${selectedId}"]`);
    if(c) c.classList.remove('selected');
    selectedId=null;
  }
  setTimeout(postHeight,280);
}

function selectMix(id){
  if(selectedId===id){closeDetail();return;}
  if(selectedId){
    const prev=document.querySelector(`.mix-card[data-id="${selectedId}"]`);
    if(prev) prev.classList.remove('selected');
  }
  selectedId=id;
  const card=document.querySelector(`.mix-card[data-id="${id}"]`);
  if(card) card.classList.add('selected');
  const m=ALL.find(x=>x.id===id);
  if(m) buildDetail(m);
}

// ── Filtros ───────────────────────────────────────────────────────────────
function applyFilter(key){
  activeFilter=key;
  const gallery=document.getElementById('gallery');
  gallery.innerHTML='';

  const shown=key==='Todas'?ALL:ALL.filter(m=>m.linea===key);
  shown.forEach(m=>gallery.appendChild(buildCard(m)));

  document.getElementById('count-badge').textContent=shown.length+' mezclas';
  if(selectedId) closeDetail();
  setTimeout(postHeight,700);
}

function buildFilters(lineas){
  const wrap=document.getElementById('filters');
  const opts=[{key:'Todas',label:'Todas'},...lineas.map(k=>({key:k,label:LINEA_LABEL[k]||k}))];
  opts.forEach(o=>{
    const btn=document.createElement('button');
    btn.className='filter-btn'+(o.key===activeFilter?' active':'');
    btn.textContent=o.label;
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      applyFilter(o.key);
    });
    wrap.appendChild(btn);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────
async function init(){
  try{
    const data=MEZCLAS_DATA;
    ALL=data.mezclas;

    document.getElementById('loading').style.display='none';

    // Detectar líneas disponibles en orden
    const lineas=['instone_premium','blangino_terrazzo','blangino_compact']
      .filter(l=>ALL.some(m=>m.linea===l));

    buildFilters(lineas);
    applyFilter('Todas');
  }catch(e){
    document.getElementById('loading').style.display='none';
    const err=document.getElementById('error');
    err.style.display='block';
    err.textContent='No se pudo cargar mezclas.json: '+e.message+'. Verificá que el archivo esté en la misma carpeta.';
    console.error('[crear-configurador]',e);
  }
}

document.addEventListener('DOMContentLoaded',init);

// Responder a pedidos de altura del padre
window.addEventListener('message',e=>{
  if(e&&e.data&&e.data.ask==='crearHeight') postHeight();
});
</script>
