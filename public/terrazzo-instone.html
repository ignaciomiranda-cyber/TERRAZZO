<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>realmood — Instone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0}
body{background:#fff}
@keyframes vIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#E2DDD3;border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:#D2CCC0}
/* ── Collapsed sidebar ───────────────────────────────── */
#rm-nav{overflow:visible}
#rm-nav .rm-logo-text{display:none}
#rm-nav [data-goto="inicio"]{justify-content:center!important;padding:8px 0 22px!important}
#rm-nav [data-view]{justify-content:center!important;padding:11px 0!important;width:44px!important;margin:0 auto!important;position:relative;overflow:visible}
#rm-nav [data-view] span{display:none!important}
#rm-nav [data-view]::after{content:attr(data-label);position:absolute;left:calc(100% + 14px);top:50%;transform:translateY(-50%);background:#1A1A18;color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:300;font-family:inherit}
#rm-nav [data-view]:hover::after{opacity:1}
#rm-nav .rm-cfg-btn{justify-content:center!important;padding:11px 0!important;width:44px!important;margin:0 auto!important;position:relative;overflow:visible}
#rm-nav .rm-cfg-btn span{display:none!important}
#rm-nav .rm-cfg-btn::after{content:'Configuración';position:absolute;left:calc(100% + 14px);top:50%;transform:translateY(-50%);background:#1A1A18;color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:300;font-family:inherit}
#rm-nav .rm-cfg-btn:hover::after{opacity:1}
/* ── Mobile nav ─────────────────────────────────────── */
#rm-mob-btn{display:none;background:transparent;border:none;cursor:pointer;padding:6px;color:#1A1A18;align-items:center;justify-content:center;border-radius:8px;flex:none}
#rm-mob-overlay{display:none;position:fixed;inset:0;z-index:198;background:rgba(0,0,0,.3)}
@media(max-width:768px){
  #rm-nav{display:none;position:fixed;top:0;left:0;bottom:0;z-index:200;width:240px!important;box-shadow:4px 0 24px rgba(0,0,0,.14);padding:18px 12px!important}
  #rm-nav.rm-open{display:flex!important}
  #rm-nav.rm-open [data-goto="inicio"]{justify-content:flex-start!important;padding:8px 12px 22px!important}
  #rm-nav.rm-open [data-view]{justify-content:flex-start!important;padding:11px 14px!important;width:100%!important;margin:0!important}
  #rm-nav.rm-open [data-view] span{display:inline!important}
  #rm-nav.rm-open [data-view]::after{display:none}
  #rm-nav.rm-open .rm-logo-text{display:inline!important}
  #rm-nav.rm-open .rm-cfg-btn{justify-content:flex-start!important;padding:11px 14px!important;width:100%!important;margin:0!important}
  #rm-nav.rm-open .rm-cfg-btn span{display:inline!important}
  #rm-nav.rm-open .rm-cfg-btn::after{display:none}
  #rm-mob-overlay.rm-open{display:block}
  #rm-mob-btn{display:flex!important}
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const $=id=>document.getElementById(id);
    // ── noise + color helpers ─────────────────────────────────
    const h2r=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
    const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
    const hash2=(x,y)=>Math.abs(Math.sin(x*127.1+y*311.7)*43758.5453)%1;
    const vnoise=(x,y)=>{const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);const a=hash2(ix,iy),b=hash2(ix+1,iy),c=hash2(ix,iy+1),d=hash2(ix+1,iy+1);return(a+(b-a)*ux)+(c-a+(a-b-c+d)*ux)*uy;};
    const fbm=(x,y,o)=>{let v=0,a=.5,f=1;for(let i=0;i<o;i++){v+=vnoise(x*f,y*f)*a;a*=.5;f*=2.1;}return v;};
    const angularPath=(ctx,cx,cy,rx,ry,seed)=>{const sides=Math.floor(4+hash2(seed,seed*1.3)*4);const ba=hash2(seed*2.1,seed*.7)*Math.PI*2;const pts=[];for(let i=0;i<sides;i++){const t=i/sides;const angle=ba+t*Math.PI*2+(hash2(seed+i*.37,seed*1.9+i)-.5)*(Math.PI*2/sides)*0.6;const rf=0.55+Math.random()*0.45;pts.push([cx+Math.cos(angle)*rx*rf,cy+Math.sin(angle)*ry*rf]);}ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();};
    const roundedPath=(ctx,cx,cy,rx,ry,seed)=>{const N=12,ba=hash2(seed*1.1,seed*0.9)*Math.PI,asp=0.50+hash2(seed,seed*1.7)*0.46;const pts=[];for(let i=0;i<N;i++){const a=ba+(i/N)*Math.PI*2;const b=1+(hash2(seed+i*.41,seed*1.9+i)-.5)*.38+(hash2(seed*.8+i,i*1.4)-.5)*.16;pts.push([cx+Math.cos(a)*rx*b,cy+Math.sin(a)*ry*asp*b]);}ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=0;i<N;i++){const p0=pts[(i-1+N)%N],p1=pts[i],p2=pts[(i+1)%N],p3=pts[(i+2)%N];const cp1x=p1[0]+(p2[0]-p0[0])/6,cp1y=p1[1]+(p2[1]-p0[1])/6;const cp2x=p2[0]-(p3[0]-p1[0])/6,cp2y=p2[1]-(p3[1]-p1[1])/6;ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,p2[0],p2[1]);}ctx.closePath();};

    const STONES={
      'Mármol blanco':'#EDEAE2','Mármol gris (Bardiglio)':'#A8A6A2','Serpentinita / Granito Rumi Black':'#242220',
      'Mármol verde':'#588A5E','Mármol rojo':'#9E3826',
      'Granito gris':'#646260','Granito verde':'#385A3C',
      'Rosa Córdoba':'#D29E94',
      'Travertino':'#CEC0A0','Caliza':'#CCBEA0',
      'Rodocrosita':'#D4607E','Conchilla':'#E8D8C4',
      'Ónix miel':'#D4820A','Ónix naranja':'#C46A38','Ónix rojo':'#AE6E6A',
      'Ónix marrón':'#AE8860','Ónix marrón oscuro':'#764E3E',
      'Latón':'#C8A460',
      'Blanca rodada':'#ECEBE4'
    };
    const ROUNDED_STONES=new Set(['Blanca rodada']);
    const SZP={'1':{min:5,max:11},'2':{min:11,max:26},'3':{min:18,max:36},'5':{min:28,max:52}};

    function makePlacer(W,H){
      const cell=20,gw=Math.ceil(W/cell),gh=Math.ceil(H/cell);
      const grid=Array.from({length:gw*gh},()=>[]);
      const gcells=(x,y,r)=>{const x1=Math.max(0,Math.floor((x-r)/cell)),x2=Math.min(gw-1,Math.floor((x+r)/cell));const y1=Math.max(0,Math.floor((y-r)/cell)),y2=Math.min(gh-1,Math.floor((y+r)/cell));const out=[];for(let gx=x1;gx<=x2;gx++)for(let gy=y1;gy<=y2;gy++)out.push(gx+gy*gw);return out;};
      return{
        overlaps(x,y,r){for(const c of gcells(x,y,r))for(const p of grid[c]){const dx=p.x-x,dy=p.y-y,md=p.r+r+1;if(dx*dx+dy*dy<md*md)return true;}return false;},
        add(x,y,r){for(const c of gcells(x,y,r))grid[c].push({x,y,r});}
      };
    }
    function drawChip(ctx,p){
      const def=STONES[p.st.name]||'#888';const [r,g,b]=h2r(def);
      const isRodada=ROUNDED_STONES.has(p.st.name);
      const seed=p.seed;const md=Math.max(p.rx,p.ry);
      if(isRodada){
        const cv=(hash2(seed*1.1,seed*.5)-.5)*8;
        ctx.save();
        roundedPath(ctx,p.x,p.y,p.rx,p.ry,seed);
        ctx.fillStyle=`rgb(${clamp(r+cv,0,255)},${clamp(g+cv,0,255)},${clamp(b+cv,0,255)})`;ctx.fill();
        roundedPath(ctx,p.x,p.y,p.rx,p.ry,seed);ctx.clip();
        const rim=ctx.createRadialGradient(p.x,p.y,md*0.45,p.x,p.y,md*1.1);
        rim.addColorStop(0,'rgba(0,0,0,0)');rim.addColorStop(1,'rgba(0,0,0,0.24)');
        ctx.fillStyle=rim;ctx.fillRect(p.x-md-2,p.y-md-2,md*2+4,md*2+4);
        const hx=p.x-p.rx*0.24,hy=p.y-p.ry*0.26;
        const hg=ctx.createRadialGradient(hx,hy,0,hx,hy,md*0.78);
        hg.addColorStop(0,'rgba(255,255,255,0.90)');hg.addColorStop(0.22,'rgba(255,255,255,0.45)');
        hg.addColorStop(0.60,'rgba(255,255,255,0.07)');hg.addColorStop(1,'rgba(255,255,255,0)');
        ctx.fillStyle=hg;ctx.fillRect(p.x-md-2,p.y-md-2,md*2+4,md*2+4);
        const spx=p.x-p.rx*0.08,spy=p.y-p.ry*0.40;
        const sg=ctx.createRadialGradient(spx,spy,0,spx,spy,md*0.20);
        sg.addColorStop(0,'rgba(255,255,255,0.60)');sg.addColorStop(1,'rgba(255,255,255,0)');

      {name:'Cocina Cerro',barrio:'Cerro de las Rosas',tag:'Cocina',terr:TERR[0]},
      {name:'Baño en blanco',barrio:'Nueva Córdoba',tag:'Baño',terr:TERR[5]},
      {name:'Mesada granito',barrio:'General Paz',tag:'Cocina',slab:SLABS[4]},
      {name:'Piso Cofico',barrio:'Cofico',tag:'Piso',terr:TERR[6]},
      {name:'Local Güemes',barrio:'Güemes',tag:'Local',terr:TERR[2]},
      {name:'Patio Villa Belgrano',barrio:'Villa Belgrano',tag:'Exterior',terr:TERR[3]},
      {name:'Obra atelier',barrio:'Alberdi',tag:'Comedor',img:'proj-2.jpg'},
      {name:'Mesada antracita',barrio:'Nueva Córdoba',tag:'Cocina',terr:TERR[7]},
      {name:'Piso pulido',barrio:'Centro',tag:'Piso',terr:TERR[4]}
    ];
    const ge=$('grid-explorar');
    const projCards=[];
    PROJECTS.forEach(p=>{
      let media;
      if(p.img)media=photoMedia(p.img);
      else if(p.slab)media=slabMedia({...p.slab,r:0.82});
      else media=terrMedia({...p.terr,r:0.82});
      const card=mkCard(media,p.name,p.barrio+' · '+p.tag,{
        filter:p.tag,search:p.barrio,saveLabel:'Guardar',saveMsg:'Proyecto guardado · '+p.name,
        overlayBtns:[{label:'Ver proyecto',primary:true,msg:'Abriendo '+p.name},{label:'Usar materiales',msg:'Cargando materiales de '+p.name}]
      });
      projCards.push(card);ge.appendChild(card);
    });
    const TAGS=['Todos','Cocina','Baño','Local','Comedor','Piso','Exterior'];
    const fwrap=$('explorar-filters');let activeFilter='Todos';
    const applyFilter=()=>{let shown=0;projCards.forEach(c=>{const ok=activeFilter==='Todos'||c.getAttribute('data-tag')===activeFilter;c.style.display=ok?'inline-block':'none';if(ok)shown++;});$('explorar-empty').style.display=shown?'none':'block';};
    const fbtns={};
    TAGS.forEach(t=>{const b=document.createElement('button');b.type='button';b.textContent=t;const on=t===activeFilter;b.style.cssText='font-family:inherit;font-size:13px;font-weight:'+(on?'600':'500')+';padding:8px 17px;border-radius:100px;cursor:pointer;border:1px solid '+(on?'#1A1A18':'#D7D1C6')+';background:'+(on?'#1A1A18':'transparent')+';color:'+(on?'#fff':'#3a3733')+';transition:all .15s';b.addEventListener('click',()=>{activeFilter=t;Object.entries(fbtns).forEach(([k,el])=>{const a=k===t;el.style.background=a?'#1A1A18':'transparent';el.style.color=a?'#fff':'#3a3733';el.style.borderColor=a?'#1A1A18':'#D7D1C6';el.style.fontWeight=a?'600':'500';});applyFilter();});fbtns[t]=b;fwrap.appendChild(b);});

    // ── placeholder views ─────────────────────────────────────
    const placeholder=(icon,title,body,cta)=>`<div style="max-width:520px;margin:80px auto;text-align:center"><div style="width:72px;height:72px;border-radius:50%;background:#F1ECE2;display:inline-flex;align-items:center;justify-content:center;color:#9b958a;margin-bottom:22px">${icon}</div><h1 style="font-size:24px;font-weight:700;margin:0 0 10px;letter-spacing:-.01em">${title}</h1><p style="font-size:14px;color:#9b958a;line-height:1.65;margin:0 0 24px">${body}</p>${cta?`<button type="button" data-goto="${cta.go}" style="font-family:inherit;font-size:14px;font-weight:700;padding:12px 24px;border-radius:100px;border:none;background:#1A1A18;color:#fff;cursor:pointer">${cta.label}</button>`:''}</div>`;
    $('view-crear').innerHTML='<iframe id="crear-frame" src="crear-configurador.html" title="Configurador de terrazzo" style="width:100%;border:none;display:block;background:transparent;min-height:1200px;margin:-24px -26px -64px;width:calc(100% + 52px)"></iframe>';
    const cf=$('crear-frame');
    if(cf)cf.addEventListener('load',()=>{try{const d=cf.contentDocument;const fo=d.querySelector('footer');if(fo)fo.style.display='none';const ap=d.querySelector('.app');if(ap){ap.style.paddingTop='6px';ap.style.maxWidth='1040px';}const fit=()=>{cf.style.height=Math.max(1000,d.documentElement.scrollHeight+12)+'px';};fit();if(window.ResizeObserver){new ResizeObserver(fit).observe(d.body);}d.addEventListener('click',()=>setTimeout(fit,300));setTimeout(fit,400);}catch(e){}});
    window.addEventListener('message',e=>{
      const h=e&&e.data&&e.data.crearHeight;if(typeof h==='number'&&cf)cf.style.height=h+'px';
      if(e&&e.data&&e.data.rmSaved)loadMoodList();
    });
    // ── Tus realmood list ─────────────────────────────────────────
    function fmtDate(iso){try{const d=new Date(iso);return d.toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'2-digit'});}catch(e){return '';}}
    function loadMoodList(){
      const vm=$('view-mood');if(!vm)return;
      let list;try{list=JSON.parse(localStorage.getItem('ins_realmoods')||'[]');}catch(e){list=[];}
      list=[...list].reverse();
      if(!list.length){
        vm.innerHTML='<div style="max-width:520px;margin:80px auto;text-align:center"><div style="width:72px;height:72px;border-radius:50%;background:#F1ECE2;display:inline-flex;align-items:center;justify-content:center;color:#9b958a;margin-bottom:22px"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="7" height="7" rx="1.5"/><rect x="13.5" y="3.5" width="7" height="7" rx="1.5"/><rect x="3.5" y="13.5" width="7" height="7" rx="1.5"/><rect x="13.5" y="13.5" width="7" height="7" rx="1.5"/></svg></div><h1 style="font-size:24px;font-weight:700;margin:0 0 10px;letter-spacing:-.01em">Tus realmood</h1><p style="font-size:14px;color:#9b958a;line-height:1.65;margin:0 0 24px">Creá un realmood en el configurador y guardalo para verlo acá.</p><button type="button" data-goto="crear" style="font-family:inherit;font-size:14px;font-weight:700;padding:12px 24px;border-radius:100px;border:none;background:#1A1A18;color:#fff;cursor:pointer">Crear realmood</button></div>';
        vm.querySelectorAll('[data-goto]').forEach(el=>el.addEventListener('click',()=>setView(el.getAttribute('data-goto'))));
        return;
      }
      let html='<div style="display:flex;align-items:baseline;gap:12px;margin-bottom:24px"><h1 style="font-size:22px;font-weight:700;margin:0;letter-spacing:-.01em">Tus realmood</h1><span style="font-size:13px;color:#9b958a">'+list.length+' guardado'+(list.length!==1?'s':'')+'</span></div>';
      html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px">';
      list.forEach((rm,i)=>{
        const st=rm.state||{};
        const tags=[st.terrazzo?'Terrazzo':'',... (st.faplacs||[]).slice(0,1).map(()=>'Melamina'),(st.stones||[]).slice(0,1).map(()=>'Piedra'),(st.pisos||[]).slice(0,1).map(()=>'Piso')].filter(Boolean).join(' · ')||'Sin materiales';
        html+='<div data-rm-id="'+rm.id+'" style="background:#fff;border-radius:16px;border:1px solid #E4DFD5;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)">'
          +'<div style="height:8px;background:linear-gradient(90deg,#1A1A18,#6f6a60)"></div>'
          +'<div style="padding:18px 18px 14px">'
          +'<div style="font-size:15px;font-weight:700;color:#1A1A18;letter-spacing:-.01em;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+rm.name+'</div>'
          +'<div style="font-size:11px;color:#9b958a;margin-bottom:12px">'+tags+'</div>'
          +'<div style="font-size:10px;color:#B3AD9F;margin-bottom:14px">Actualizado '+fmtDate(rm.updatedAt||rm.createdAt)+'</div>'
          +'<div style="display:flex;gap:8px">'
          +'<button type="button" class="rm-load-btn" style="flex:1;font-family:inherit;font-size:12px;font-weight:700;padding:8px 14px;border-radius:100px;border:none;background:#1A1A18;color:#fff;cursor:pointer">Cargar</button>'
          +'<button type="button" class="rm-del-btn" style="font-family:inherit;font-size:12px;font-weight:600;padding:8px 12px;border-radius:100px;border:1px solid #E4DFD5;background:#fff;color:#9b958a;cursor:pointer">Borrar</button>'
          +'</div></div></div>';
      });
      html+='</div>';
      vm.innerHTML=html;
      vm.querySelectorAll('[data-rm-id]').forEach(card=>{
        const id=card.getAttribute('data-rm-id');
        card.querySelector('.rm-load-btn').addEventListener('click',()=>{
          setView('crear');
          setTimeout(()=>{const f=$('crear-frame');if(f)f.contentWindow.postMessage({loadRmId:id},'*');},400);
        });
        card.querySelector('.rm-del-btn').addEventListener('click',()=>{
          if(!confirm('¿Borrar este realmood?'))return;
          let lst;try{lst=JSON.parse(localStorage.getItem('ins_realmoods')||'[]');}catch(e){lst=[];}
          lst=lst.filter(x=>x.id!==id);
          try{localStorage.setItem('ins_realmoods',JSON.stringify(lst));}catch(e){}
          loadMoodList();
          toast('Realmood eliminado');
        });
      });
    }
    loadMoodList();
    $('view-saved').innerHTML=placeholder('<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4.5h12v15.5l-6-4.2-6 4.2z"/></svg>','Tus proyectos guardados','Los proyectos que guardes desde Explorar quedarán acá para volver a verlos y reutilizar sus materiales.',{label:'Ver proyectos de Córdoba',go:'explorar'});
    $('view-mensajes').innerHTML=placeholder('<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8 8 0 0 1-11.6 7.1L4 20.5l1.9-5.3A8 8 0 1 1 21 11.5z"/></svg>','Mensajes','Acá vas a poder hablar con el equipo de Instone sobre tus diseños y cotizaciones.',null);

    // ── view switching ────────────────────────────────────────
    const VIEWS=['inicio','explorar','crear','mood','saved','mensajes'];
    const navBtns=Array.from(document.querySelectorAll('aside [data-view]'));
    const setView=v=>{
      VIEWS.forEach(x=>{const s=$('view-'+x);if(s)s.style.display=x===v?'':'none';});
      navBtns.forEach(b=>{const a=b.getAttribute('data-view')===v;b.style.background=a?'#EFEBE3':'transparent';b.style.color=a?'#1A1A18':'#3a3733';b.style.fontWeight=a?'600':'500';b._active=a;});
      const sec=$('view-'+v);if(sec){sec.style.animation='none';void sec.offsetWidth;sec.style.animation='vIn .35s ease';}
      if(v==='crear'){const cfr=$('crear-frame');if(cfr&&cfr.contentWindow){[150,450,1000,1700].forEach(t=>setTimeout(()=>{try{cfr.contentWindow.postMessage({ask:'crearHeight'},'*');}catch(_){}},t));}}
      if(v==='mood')loadMoodList();
      $('ins-search').value='';doSearch('');
      const mNav=document.getElementById('rm-nav');const mOv=document.getElementById('rm-mob-overlay');
      if(mNav)mNav.classList.remove('rm-open');if(mOv)mOv.classList.remove('rm-open');
    };
    navBtns.forEach(b=>{
      b.addEventListener('click',()=>setView(b.getAttribute('data-view')));
      b.addEventListener('mouseenter',()=>{if(!b._active)b.style.background='#F3F0EA';});
      b.addEventListener('mouseleave',()=>{if(!b._active)b.style.background='transparent';});
    });
    document.querySelectorAll('[data-goto]').forEach(el=>el.addEventListener('click',()=>setView(el.getAttribute('data-goto'))));

    // ── search (filters visible cards in active view) ─────────
    const doSearch=q=>{
      q=(q||'').trim().toLowerCase();
      const active=VIEWS.find(x=>{const s=$('view-'+x);return s&&s.style.display!=='none';});
      const grid=active==='inicio'?gi:active==='explorar'?ge:null;
      if(!grid)return;
      let shown=0;
      Array.from(grid.children).forEach(c=>{
        const passFilter=active==='explorar'?(activeFilter==='Todos'||c.getAttribute('data-tag')===activeFilter):(active==='inicio'?((activeCat==='Todos'||c.getAttribute('data-cat')===activeCat)&&(activeCity==='Todas'||c.getAttribute('data-ciudad')===activeCity)):true);
        const passQ=!q||(c.getAttribute('data-title')||'').includes(q);
        const ok=passFilter&&passQ;c.style.display=ok?'inline-block':'none';if(ok)shown++;
      });
      if(active==='explorar')$('explorar-empty').style.display=shown?'none':'block';
    };
    $('ins-search').addEventListener('input',e=>doSearch(e.target.value));

    setView('inicio');
});
function toggleMobMenu(){
  const nav=document.getElementById('rm-nav');
  const ov=document.getElementById('rm-mob-overlay');
  const open=nav.classList.contains('rm-open');
  if(open){nav.classList.remove('rm-open');ov.classList.remove('rm-open');}
  else{nav.classList.add('rm-open');ov.classList.add('rm-open');}
}
</script>
</body>
</html>
