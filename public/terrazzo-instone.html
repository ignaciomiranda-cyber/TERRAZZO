<div id="ins-toast" style="position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1A18;color:#fff;padding:11px 22px;border-radius:100px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:200;white-space:nowrap">—</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const $=id=>document.getElementById(id);
    // ── noise + color helpers ─────────────────────────────────
    const h2r=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
    const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
    const hash2=(x,y)=>Math.abs(Math.sin(x*127.1+y*311.7)*43758.5453)%1;
    const vnoise=(x,y)=>{const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);const a=hash2(ix,iy),b=hash2(ix+1,iy),c=hash2(ix,iy+1),d=hash2(ix+1,iy+1);return(a+(b-a)*ux)+(c-a+(a-b-c+d)*ux)*uy;};
    const fbm=(x,y,o)=>{let v=0,a=.5,f=1;for(let i=0;i<o;i++){v+=vnoise(x*f,y*f)*a;a*=.5;f*=2.1;}return v;};
    const angularPath=(ctx,cx,cy,rx,ry,seed)=>{const sides=Math.floor(4+hash2(seed,seed*1.3)*4);const ba=hash2(seed*2.1,seed*.7)*Math.PI*2;const pts=[];for(let i=0;i<sides;i++){const t=i/sides;const angle=ba+t*Math.PI*2+(hash2(seed+i*.37,seed*1.9+i)-.5)*(Math.PI*2/sides)*0.6;const rf=0.55+Math.random()*0.45;pts.push([cx+Math.cos(angle)*rx*rf,cy+Math.sin(angle)*ry*rf]);}ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();};
    const roundedPath=(ctx,cx,cy,rx,ry,seed)=>{const angle=hash2(seed*1.31,seed*0.73)*Math.PI;const scx=0.82+hash2(seed*2.1,seed*0.41)*0.18;const scy=0.72+hash2(seed*0.9,seed*1.83)*0.18;ctx.beginPath();ctx.ellipse(cx,cy,rx*scx,ry*scy,angle,0,Math.PI*2);};

    const STONES={
      'Blanca':'#EDEAE2','Negra':'#242220','Gris perla':'#A8A6A2','Gris oscura':'#646260',
      'Rosa':'#D29E94','Rosa oscura':'#AE6E6A','Marrón clara':'#AE8860','Ocre/dorada':'#D4820A',
      'Verde jade':'#588A5E','Celeste':'#78A8C0','Beige mármol':'#CCBEA0','Naranja':'#C46A38','Roja':'#9E3826',
      'Blanca rodada':'#ECEBE4'
    };
    const ROUNDED_STONES=new Set(['Blanca rodada']);
    const SZP={'1':{min:5,max:11},'2':{min:11,max:26},'5':{min:28,max:52}};

    function makePlacer(W,H){
      const cell=20,gw=Math.ceil(W/cell),gh=Math.ceil(H/cell);
      const grid=Array.from({length:gw*gh},()=>[]);
      const gcells=(x,y,r)=>{const x1=Math.max(0,Math.floor((x-r)/cell)),x2=Math.min(gw-1,Math.floor((x+r)/cell));const y1=Math.max(0,Math.floor((y-r)/cell)),y2=Math.min(gh-1,Math.floor((y+r)/cell));const out=[];for(let gx=x1;gx<=x2;gx++)for(let gy=y1;gy<=y2;gy++)out.push(gx+gy*gw);return out;};
      return{
        overlaps(x,y,r){for(const c of gcells(x,y,r))for(const p of grid[c]){const dx=p.x-x,dy=p.y-y,md=p.r+r+1;if(dx*dx+dy*dy<md*md)return true;}return false;},
        add(x,y,r){for(const c of gcells(x,y,r))grid[c].push({x,y,r});}
      };
    }
    function drawChip(ctx,p){
      const def=STONES[p.st.name]||'#888';const [r,g,b]=h2r(def);
      const isRodada=ROUNDED_STONES.has(p.st.name);
      const chipPath=(cx,cy,rx,ry,seed)=>isRodada?roundedPath(ctx,cx,cy,rx,ry,seed):angularPath(ctx,cx,cy,rx,ry,seed);
      chipPath(p.x,p.y,p.rx,p.ry,p.seed);
      ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fill();
      ctx.lineWidth=1;ctx.strokeStyle='rgba(0,0,0,.12)';ctx.stroke();
      const hl=ctx.createLinearGradient(p.x-p.rx,p.y-p.ry,p.x+p.rx,p.y+p.ry);
      hl.addColorStop(0,'rgba(255,255,255,.28)');hl.addColorStop(.5,'rgba(255,255,255,0)');hl.addColorStop(1,'rgba(0,0,0,.10)');
      chipPath(p.x,p.y,p.rx,p.ry,p.seed);ctx.fillStyle=hl;ctx.fill();
    }
    function renderTerr(cv,baseHex,stones,W,H){
      cv.width=W;cv.height=H;const ctx=cv.getContext('2d');
      const [br,bg,bb]=h2r(baseHex);
      const id=ctx.createImageData(W,H);const d=id.data;const sc=0.006;
      for(let y=0;y<H;y++)for(let x=0;x<W;x++){
        const n=fbm(x*sc,y*sc,5),n2=fbm(x*sc*4+30,y*sc*4+70,3);
        const grain=(hash2(x*0.7+5,y*1.1+9)-.5)*9;
        const g=(n-.5)*15+(n2-.5)*7+grain,i=(y*W+x)*4;
        d[i]=clamp(br+g,0,255);d[i+1]=clamp(bg+g,0,255);d[i+2]=clamp(bb+g,0,255);d[i+3]=255;
      }
      ctx.putImageData(id,0,0);
      const active=stones.filter(s=>s.pct>0);if(!active.length)return;
      const totalPct=active.reduce((a,s)=>a+s.pct,0);const totalArea=W*H*0.86;
      const specs=active.map(s=>{const sp=SZP[s.size];const avgR=(sp.min+sp.max)/2;const avgArea=Math.PI*avgR*avgR*0.65;const count=Math.max(1,Math.round(totalArea*(s.pct/totalPct)/avgArea));return{s,sp,count};}).sort((a,b)=>b.sp.max-a.sp.max);
      const placer=makePlacer(W,H);const all=[];
      specs.forEach(({s,sp,count},si)=>{let placed=0;const maxTries=count*20;for(let i=0;i<maxTries&&placed<count;i++){const rx=sp.min+Math.random()*(sp.max-sp.min);const ry=rx*(0.55+Math.random()*0.7);const md=Math.max(rx,ry);const pad=md+1;if(pad*2>=Math.min(W,H))continue;const x=pad+Math.random()*(W-pad*2);const y=pad+Math.random()*(H-pad*2);if(!placer.overlaps(x,y,md*0.72)){placer.add(x,y,md*0.72);all.push({x,y,rx,ry,r:md,st:s,seed:hash2(x*.01+si*10,y*.01+placed*.07)*200});placed++;}}});
      all.sort((a,b)=>b.r-a.r);all.forEach(p=>drawChip(ctx,p));
      const micro=Math.round(W*H*0.0013);
      for(let i=0;i<micro;i++){const x=Math.random()*W,y=Math.random()*H;let pick=Math.random()*totalPct,sel=active[0];for(const a of active){pick-=a.pct;if(pick<=0){sel=a;break;}}const [r,g,b]=h2r(STONES[sel.name]||'#888');const cv2=(Math.random()-.5)*16;const rr=0.6+Math.random()*1.6;angularPath(ctx,x,y,rr,rr*(0.7+Math.random()*0.6),Math.random()*200);ctx.fillStyle=`rgba(${clamp(r+cv2,0,255)},${clamp(g+cv2,0,255)},${clamp(b+cv2,0,255)},${0.5+Math.random()*0.32})`;ctx.fill();}
      const sheen=ctx.createRadialGradient(W*0.36,H*0.30,0,W*0.42,H*0.42,Math.max(W,H)*0.95);
      sheen.addColorStop(0,'rgba(255,255,255,0.05)');sheen.addColorStop(1,'rgba(0,0,0,0.05)');
      ctx.fillStyle=sheen;ctx.fillRect(0,0,W,H);
    }
    function renderSlab(cv,m,W,H){
      cv.width=W;cv.height=H;const ctx=cv.getContext('2d');
      const [br,bg,bb]=h2r(m.bg);const sc=m.style==='solid'?0.004:0.011;
      const id=ctx.createImageData(W,H);const d=id.data;
      for(let y=0;y<H;y++)for(let x=0;x<W;x++){const n=fbm(x*sc+(m.seed||0),y*sc+(m.seed||0),4);const g=(n-.5)*(m.style==='solid'?14:30);const i=(y*W+x)*4;d[i]=clamp(br+g,0,255);d[i+1]=clamp(bg+g,0,255);d[i+2]=clamp(bb+g,0,255);d[i+3]=255;}
      ctx.putImageData(id,0,0);
      if(m.style==='marble'||m.style==='quartzite'){
        const veins=m.veins||['#9a9a9a'];const count=m.style==='quartzite'?5:4;ctx.lineCap='round';ctx.lineJoin='round';
        for(let k=0;k<count;k++){const col=veins[k%veins.length];const [r,g,b]=h2r(col);let x=Math.random()*W,y=Math.random()*H*0.35;let ang=Math.random()*Math.PI*2;ctx.beginPath();ctx.moveTo(x,y);const segs=8+Math.floor(Math.random()*6);for(let s=0;s<segs;s++){ang+=(Math.random()-.5)*1.15;const len=W/segs*(.7+Math.random()*.9);const nx=x+Math.cos(ang)*len,ny=y+Math.sin(ang)*len;const mx=(x+nx)/2+(Math.random()-.5)*18,my=(y+ny)/2+(Math.random()-.5)*18;ctx.quadraticCurveTo(mx,my,nx,ny);x=nx;y=ny;}const w=m.veinW||2;ctx.lineWidth=w*2.4;ctx.strokeStyle=`rgba(${r},${g},${b},${(m.veinA||.5)*.16})`;ctx.stroke();ctx.lineWidth=w;ctx.strokeStyle=`rgba(${r},${g},${b},${m.veinA||.5})`;ctx.stroke();}
      } else if(m.style==='granite'){
        const cols=m.specks||['#333','#777'];const n=Math.round((m.density||1400)*(W*H)/(150*150));for(let i=0;i<n;i++){const x=Math.random()*W,y=Math.random()*H;const [r,g,b]=h2r(cols[Math.floor(Math.random()*cols.length)]);ctx.fillStyle=`rgba(${r},${g},${b},${.35+Math.random()*.5})`;ctx.beginPath();ctx.arc(x,y,.5+Math.random()*(Math.min(W,H)/90),0,Math.PI*2);ctx.fill();}
      } else if(m.style==='terrazzo'){
        const cols=m.chips||['#ccc','#aaa'];const n=Math.round((m.density||80)*(W*H)/(150*150));for(let i=0;i<n;i++){const x=Math.random()*W,y=Math.random()*H;const rad=(m.chipR||9)*(Math.min(W,H)/150);const rx=2+Math.random()*rad,ry=rx*(.6+Math.random()*.6);const [r,g,b]=h2r(cols[Math.floor(Math.random()*cols.length)]);angularPath(ctx,x,y,rx,ry,hash2(x*.1,y*.1)*100);ctx.fillStyle=`rgba(${r},${g},${b},.9)`;ctx.fill();ctx.lineWidth=.6;ctx.strokeStyle='rgba(0,0,0,.10)';ctx.stroke();}
      }
      const sh=ctx.createLinearGradient(0,0,W,H);sh.addColorStop(0,'rgba(255,255,255,.10)');sh.addColorStop(.5,'rgba(255,255,255,.02)');sh.addColorStop(1,'rgba(0,0,0,.06)');ctx.fillStyle=sh;ctx.fillRect(0,0,W,H);
    }

    // ── catalog data ──────────────────────────────────────────
    const TERR=[
      {base:'#F0EDE6',stones:[{name:'Blanca',size:'2',pct:60},{name:'Negra',size:'2',pct:8},{name:'Rosa',size:'2',pct:20},{name:'Ocre/dorada',size:'2',pct:12}],title:'Confeti cálido',r:0.78},
      {base:'#1A1A18',stones:[{name:'Blanca',size:'5',pct:100}],title:'Tuxedo grande',r:1},
      {base:'#B45C4C',stones:[{name:'Blanca',size:'2',pct:40},{name:'Rosa',size:'2',pct:60}],title:'Terracota rosado',r:0.8},
      {base:'#88A686',stones:[{name:'Blanca',size:'2',pct:55},{name:'Negra',size:'2',pct:45}],title:'Verde salvia',r:1},
      {base:'#C4C2BC',stones:[{name:'Negra',size:'1',pct:45},{name:'Gris perla',size:'2',pct:35},{name:'Ocre/dorada',size:'1',pct:20}],title:'Gris pulido',r:0.72},
      {base:'#F0EDE6',stones:[{name:'Blanca',size:'1',pct:80},{name:'Negra',size:'1',pct:20}],title:'Blanco fino',r:1.18},
      {base:'#D0A49C',stones:[{name:'Rosa oscura',size:'2',pct:90},{name:'Blanca',size:'2',pct:10}],title:'Rosa pálido',r:0.8},
      {base:'#545250',stones:[{name:'Negra',size:'2',pct:50},{name:'Gris oscura',size:'2',pct:30},{name:'Ocre/dorada',size:'2',pct:20}],title:'Antracita oro',r:1},
      {base:'#E8E4DC',stones:[{name:'Blanca rodada',size:'5',pct:100}],title:'Piedra blanca rodada N°5',r:0.9}
    ];
    const SLABS=[
      {name:'Arabescato',tipo:'Mármol',bg:'#E8E7E3',style:'marble',veins:['#8E8C88','#6A6864'],veinW:3,veinA:.55,seed:2,r:0.8},
      {name:'Amazónico',tipo:'Mármol',bg:'#43463A',style:'marble',veins:['#A88A3A','#C9C4B4'],veinW:2.5,veinA:.5,seed:18,r:1.16},
      {name:'Absolute Black',tipo:'Sinterizado',bg:'#222426',style:'solid',seed:3,r:1},
      {name:'Amazonite',tipo:'Cuarcita',bg:'#5FA89C',style:'quartzite',veins:['#2E6E64','#E8DCD0'],veinW:3,veinA:.45,seed:25,r:0.78},
      {name:'Alpinus',tipo:'Granito',bg:'#D6D0C4',style:'granite',specks:['#3A4A36','#6E6452','#2A2A28'],density:1700,seed:5,r:1},
      {name:'Arabescato Bianco',tipo:'Terrazzo',bg:'#E5DECF',style:'terrazzo',chips:['#CFE0DE','#E8E2D2','#D8C4B0','#A9B4AE'],density:80,chipR:11,seed:8,r:0.82}
    ];
    const MEL=[
      {name:'Petiribí',bg:'#9E7C3C',wood:true},
      {name:'Terracota',bg:'#A05B40'},
      {name:'Jade',bg:'#95AD8B'},
      {name:'Sauco',bg:'#2B2B29',wood:true},
      {name:'Scotch',bg:'#BE9A63',wood:true},
      {name:'Gris Basalto',bg:'#9D9D9A'},
      {name:'Seda Azzurra',bg:'#0D2A34'}
    ];
    const PANTONE=[
      {code:'19-1541',name:'Roasted Russet',hex:'#7E3A33'},
      {code:'16-0945',name:'Tinsel',hex:'#C99A4E'},
      {code:'14-6007',name:'Sea Foam',hex:'#AEC4B2'},
      {code:'19-3926',name:'Crown Blue',hex:'#474C6A'}
    ];
    const PHOTOS=[
      {img:'prod-eco.jpg',title:'Instalación ECO-005',tag:'Inspiración'},
      {img:'prod-bangkok.jpg',title:'Sillas Bangkok',tag:'Mobiliario'},
      {img:'prod-brass.jpg',title:'Mesa de vidrio y latón',tag:'Detalle'},
      {img:'life-1.jpg',title:'Rincón de trabajo',tag:'Ambiente'},
      {img:'proj-2.jpg',title:'Obra en Córdoba',tag:'Proyecto'},
      {img:'proj-3.jpg',title:'Detalle de obra',tag:'Proyecto'},
      {img:'cocina-ambiente.jpg',title:'Cocina en terracota',tag:'Ambiente'},
      {img:'mesa-ambiente.jpg',title:'Mesa de comedor',tag:'Ambiente'},
      {img:'mesa-ambienteop2.jpg',title:'Detalle de mesa',tag:'Detalle'},
      {img:'pasted-1781733750827-0.png',title:'Combinación de materiales',tag:'Inspiración'},
      {img:'pasted-1781733758235-0.png',title:'Paleta natural',tag:'Inspiración'},
      {img:'pasted-1781734716790-0.png',title:'Moodboard cálido',tag:'Inspiración'}
    ];

    // ── toast ─────────────────────────────────────────────────
    let tT;
    const toast=msg=>{const t=$('ins-toast');t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';clearTimeout(tT);tT=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(20px)';},2400);};

    // ── pin builder ───────────────────────────────────────────
    const mkCard=(media,title,tag,opts)=>{
      opts=opts||{};
      const card=document.createElement('div');
      card.setAttribute('data-title',(title+' '+(tag||'')+' '+(opts.search||'')).toLowerCase());
      if(opts.filter)card.setAttribute('data-tag',opts.filter);
      if(opts.cat)card.setAttribute('data-cat',opts.cat);
      card.style.cssText='break-inside:avoid;margin-bottom:16px;display:inline-block;width:100%';
      const inner=document.createElement('div');
      inner.style.cssText='position:relative;border-radius:16px;overflow:hidden;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:zoom-in;transition:box-shadow .25s,transform .2s';
      inner.appendChild(media);
      const ov=document.createElement('div');
      ov.style.cssText='position:absolute;inset:0;opacity:0;transition:opacity .18s;pointer-events:none;background:linear-gradient(180deg,rgba(26,26,24,.32) 0%,rgba(26,26,24,0) 26%,rgba(26,26,24,0) 60%,rgba(26,26,24,.45));';
      inner.appendChild(ov);
      const save=document.createElement('button');
      save.type='button';save.textContent=opts.saveLabel||'Guardar';
      save.style.cssText='position:absolute;top:12px;right:12px;background:#E0491A;color:#fff;border:none;border-radius:100px;font-family:inherit;font-size:12px;font-weight:700;padding:9px 15px;cursor:pointer;opacity:0;transition:opacity .18s;';
      save.addEventListener('click',e=>{e.stopPropagation();toast(opts.saveMsg||('Guardado en Tus realmood · '+title));});
      inner.appendChild(save);
      if(opts.overlayBtns){
        const row=document.createElement('div');
        row.style.cssText='position:absolute;left:12px;right:12px;bottom:12px;display:flex;gap:8px;opacity:0;transition:opacity .18s;';
        opts.overlayBtns.forEach(b=>{const bt=document.createElement('button');bt.type='button';bt.textContent=b.label;bt.style.cssText='font-family:inherit;font-size:12px;font-weight:700;padding:9px 14px;border-radius:100px;border:none;cursor:pointer;'+(b.primary?'background:#fff;color:#1A1A18;':'background:rgba(255,255,255,.22);color:#fff;border:1px solid rgba(255,255,255,.5);');bt.addEventListener('click',e=>{e.stopPropagation();toast(b.msg);});row.appendChild(bt);});
        inner.appendChild(row);
        inner._row=row;
      }
      inner.addEventListener('mouseenter',()=>{inner.style.transform='translateY(-3px)';inner.style.boxShadow='0 14px 34px rgba(0,0,0,.15)';ov.style.opacity='1';save.style.opacity='1';if(inner._row)inner._row.style.opacity='1';});
      inner.addEventListener('mouseleave',()=>{inner.style.transform='none';inner.style.boxShadow='0 1px 3px rgba(0,0,0,.08)';ov.style.opacity='0';save.style.opacity='0';if(inner._row)inner._row.style.opacity='0';});
      card.appendChild(inner);
      if(title&&opts.captionBelow!==false){
        const cap=document.createElement('div');
        cap.style.cssText='padding:9px 6px 2px';
        cap.innerHTML='<div style="font-size:13px;font-weight:600;line-height:1.3;color:#1A1A18">'+title+'</div>'+(tag?'<div style="font-size:11px;color:#9b958a;margin-top:2px">'+tag+'</div>':'');
        card.appendChild(cap);
      }
      return card;
    };
    const terrMedia=t=>{const c=document.createElement('canvas');c.style.cssText='display:block;width:100%';const W=360,H=Math.round(360*t.r);renderTerr(c,t.base,t.stones,W,H);return c;};
    const slabMedia=m=>{const c=document.createElement('canvas');c.style.cssText='display:block;width:100%';const W=320,H=Math.round(320*m.r);renderSlab(c,m,W,H);return c;};
    const melMedia=m=>{const d=document.createElement('div');d.style.cssText='display:block;width:100%;height:300px;background-color:'+m.bg+';background-image:'+(m.wood?'repeating-linear-gradient(92deg,rgba(255,255,255,.08) 0,rgba(0,0,0,.06) 6px,rgba(255,255,255,.05) 13px),linear-gradient(160deg,rgba(255,255,255,.14),rgba(0,0,0,.10))':'linear-gradient(155deg,rgba(255,255,255,.16),rgba(0,0,0,.04) 55%,rgba(0,0,0,.12))')+';';return d;};
    const panMedia=p=>{const d=document.createElement('div');d.style.cssText='display:block;width:100%;background:#fff';d.innerHTML='<div style="height:150px;background:'+p.hex+'"></div><div style="padding:10px 12px 14px"><div style="font-family:Helvetica,Arial,sans-serif;font-weight:800;font-size:13px;letter-spacing:-.02em;color:#111">PANTONE<sup style="font-size:7px">®</sup></div><div style="font-size:11px;font-weight:700;color:#111;margin-top:6px">'+p.code+'</div><div style="font-size:11px;font-weight:700;color:#111">'+p.name+'</div></div>';return d;};
    const photoMedia=src=>{const im=document.createElement('img');im.src=src;im.loading='lazy';im.style.cssText='display:block;width:100%;height:auto';return im;};

    // ── Inicio feed ───────────────────────────────────────────
    const inicio=[];
    TERR.forEach(t=>inicio.push(mkCard(terrMedia(t),t.title,'Terrazzo · Instone',{search:'terrazzo',cat:'Terrazzo'})));
    SLABS.forEach(m=>inicio.push(mkCard(slabMedia(m),m.name,m.tipo+' · De Stefano',{search:'piedra '+m.tipo,cat:'Piedras'})));
    MEL.forEach(m=>inicio.push(mkCard(melMedia(m),m.name,'Melamina · Faplac',{search:'melamina',cat:'Melaminas'})));
    PANTONE.forEach(p=>inicio.push(mkCard(panMedia(p),p.name,'Pantone '+p.code,{captionBelow:false,search:'pantone color',cat:'Pantone'})));
    PHOTOS.forEach(p=>inicio.push(mkCard(photoMedia(p.img),p.title,p.tag,{search:p.tag,cat:'Ambientes'})));
    for(let i=inicio.length-1;i>0;i--){const j=Math.floor(hash2(i*3.1,i*7.7)*(i+1));[inicio[i],inicio[j]]=[inicio[j],inicio[i]];}
    const gi=$('grid-inicio');inicio.forEach(c=>gi.appendChild(c));
    const ICATS=['Todos','Terrazzo','Piedras','Melaminas','Pantone','Ambientes'];
    const cwrap=$('inicio-cats');let activeCat='Todos';const cbtns={};
    ICATS.forEach(t=>{const b=document.createElement('button');b.type='button';b.textContent=t;const on=t===activeCat;b.style.cssText='font-family:inherit;font-size:13px;font-weight:'+(on?'600':'500')+';padding:8px 17px;border-radius:100px;cursor:pointer;border:1px solid '+(on?'#1A1A18':'#D7D1C6')+';background:'+(on?'#1A1A18':'transparent')+';color:'+(on?'#fff':'#3a3733')+';transition:all .15s';b.addEventListener('click',()=>{activeCat=t;Object.entries(cbtns).forEach(([k,el])=>{const a=k===t;el.style.background=a?'#1A1A18':'transparent';el.style.color=a?'#fff':'#3a3733';el.style.borderColor=a?'#1A1A18':'#D7D1C6';el.style.fontWeight=a?'600':'500';});doSearch($('ins-search').value);});cbtns[t]=b;cwrap.appendChild(b);});

    // ── Explorar · Córdoba projects ───────────────────────────
    const PROJECTS=[
      {name:'Copa Tomada',barrio:'Nueva Córdoba',tag:'Local',img:'proj-1.jpg'},
      {name:'Estructura roja',barrio:'Centro',tag:'Local',img:'proj-4.jpg'},
      {name:'Cielorraso modular',barrio:'General Paz',tag:'Comedor',img:'proj-3.jpg'},
      {name:'Cocina Cerro',barrio:'Cerro de las Rosas',tag:'Cocina',terr:TERR[0]},
      {name:'Baño en blanco',barrio:'Nueva Córdoba',tag:'Baño',terr:TERR[5]},
      {name:'Mesada granito',barrio:'General Paz',tag:'Cocina',slab:SLABS[4]},
      {name:'Piso Cofico',barrio:'Cofico',tag:'Piso',terr:TERR[6]},
      {name:'Local Güemes',barrio:'Güemes',tag:'Local',terr:TERR[2]},
      {name:'Patio Villa Belgrano',barrio:'Villa Belgrano',tag:'Exterior',terr:TERR[3]},
      {name:'Obra atelier',barrio:'Alberdi',tag:'Comedor',img:'proj-2.jpg'},
      {name:'Mesada antracita',barrio:'Nueva Córdoba',tag:'Cocina',terr:TERR[7]},
      {name:'Piso pulido',barrio:'Centro',tag:'Piso',terr:TERR[4]}
    ];
    const ge=$('grid-explorar');
    const projCards=[];
    PROJECTS.forEach(p=>{
      let media;
      if(p.img)media=photoMedia(p.img);
      else if(p.slab)media=slabMedia({...p.slab,r:0.82});
      else media=terrMedia({...p.terr,r:0.82});
      const card=mkCard(media,p.name,p.barrio+' · '+p.tag,{
        filter:p.tag,search:p.barrio,saveLabel:'Guardar',saveMsg:'Proyecto guardado · '+p.name,
        overlayBtns:[{label:'Ver proyecto',primary:true,msg:'Abriendo '+p.name},{label:'Usar materiales',msg:'Cargando materiales de '+p.name}]
      });
      projCards.push(card);ge.appendChild(card);
    });
    const TAGS=['Todos','Cocina','Baño','Local','Comedor','Piso','Exterior'];
    const fwrap=$('explorar-filters');let activeFilter='Todos';
    const applyFilter=()=>{let shown=0;projCards.forEach(c=>{const ok=activeFilter==='Todos'||c.getAttribute('data-tag')===activeFilter;c.style.display=ok?'inline-block':'none';if(ok)shown++;});$('explorar-empty').style.display=shown?'none':'block';};
    const fbtns={};
    TAGS.forEach(t=>{const b=document.createElement('button');b.type='button';b.textContent=t;const on=t===activeFilter;b.style.cssText='font-family:inherit;font-size:13px;font-weight:'+(on?'600':'500')+';padding:8px 17px;border-radius:100px;cursor:pointer;border:1px solid '+(on?'#1A1A18':'#D7D1C6')+';background:'+(on?'#1A1A18':'transparent')+';color:'+(on?'#fff':'#3a3733')+';transition:all .15s';b.addEventListener('click',()=>{activeFilter=t;Object.entries(fbtns).forEach(([k,el])=>{const a=k===t;el.style.background=a?'#1A1A18':'transparent';el.style.color=a?'#fff':'#3a3733';el.style.borderColor=a?'#1A1A18':'#D7D1C6';el.style.fontWeight=a?'600':'500';});applyFilter();});fbtns[t]=b;fwrap.appendChild(b);});

    // ── placeholder views ─────────────────────────────────────
    const placeholder=(icon,title,body,cta)=>`<div style="max-width:520px;margin:80px auto;text-align:center"><div style="width:72px;height:72px;border-radius:50%;background:#F1ECE2;display:inline-flex;align-items:center;justify-content:center;color:#9b958a;margin-bottom:22px">${icon}</div><h1 style="font-size:24px;font-weight:700;margin:0 0 10px;letter-spacing:-.01em">${title}</h1><p style="font-size:14px;color:#9b958a;line-height:1.65;margin:0 0 24px">${body}</p>${cta?`<button type="button" data-goto="${cta.go}" style="font-family:inherit;font-size:14px;font-weight:700;padding:12px 24px;border-radius:100px;border:none;background:#1A1A18;color:#fff;cursor:pointer">${cta.label}</button>`:''}</div>`;
    $('view-crear').innerHTML='<iframe id="crear-frame" src="crear-configurador.html" title="Configurador de terrazzo" style="width:100%;border:none;display:block;background:transparent;min-height:1200px;margin:-24px -26px -64px;width:calc(100% + 52px)"></iframe>';
    const cf=$('crear-frame');
    if(cf)cf.addEventListener('load',()=>{try{const d=cf.contentDocument;const fo=d.querySelector('footer');if(fo)fo.style.display='none';const ap=d.querySelector('.app');if(ap){ap.style.paddingTop='6px';ap.style.maxWidth='1040px';}const fit=()=>{cf.style.height=Math.max(1000,d.documentElement.scrollHeight+12)+'px';};fit();if(window.ResizeObserver){new ResizeObserver(fit).observe(d.body);}d.addEventListener('click',()=>setTimeout(fit,300));setTimeout(fit,400);}catch(e){}});
    window.addEventListener('message',e=>{const h=e&&e.data&&e.data.crearHeight;if(typeof h==='number'&&cf)cf.style.height=h+'px';});
    $('view-mood').innerHTML=placeholder('<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="7" height="7" rx="1.5"/><rect x="13.5" y="3.5" width="7" height="7" rx="1.5"/><rect x="3.5" y="13.5" width="7" height="7" rx="1.5"/><rect x="13.5" y="13.5" width="7" height="7" rx="1.5"/></svg>','Tus realmood','Tus moodboards de materiales guardados aparecerán acá. Guardá muestras desde Inicio o Explorar para empezar a armarlos.',{label:'Explorar inspiración',go:'inicio'});
    $('view-saved').innerHTML=placeholder('<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4.5h12v15.5l-6-4.2-6 4.2z"/></svg>','Tus proyectos guardados','Los proyectos que guardes desde Explorar quedarán acá para volver a verlos y reutilizar sus materiales.',{label:'Ver proyectos de Córdoba',go:'explorar'});
    $('view-mensajes').innerHTML=placeholder('<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8 8 0 0 1-11.6 7.1L4 20.5l1.9-5.3A8 8 0 1 1 21 11.5z"/></svg>','Mensajes','Acá vas a poder hablar con el equipo de Instone sobre tus diseños y cotizaciones.',null);

    // ── view switching ────────────────────────────────────────
    const VIEWS=['inicio','explorar','crear','mood','saved','mensajes'];
    const navBtns=Array.from(document.querySelectorAll('aside [data-view]'));
    const setView=v=>{
      VIEWS.forEach(x=>{const s=$('view-'+x);if(s)s.style.display=x===v?'':'none';});
      navBtns.forEach(b=>{const a=b.getAttribute('data-view')===v;b.style.background=a?'#EFEBE3':'transparent';b.style.color=a?'#1A1A18':'#3a3733';b.style.fontWeight=a?'600':'500';b._active=a;});
      const sec=$('view-'+v);if(sec){sec.style.animation='none';void sec.offsetWidth;sec.style.animation='vIn .35s ease';}
      if(v==='crear'){const cfr=$('crear-frame');if(cfr&&cfr.contentWindow){[150,450,1000,1700].forEach(t=>setTimeout(()=>{try{cfr.contentWindow.postMessage({ask:'crearHeight'},'*');}catch(_){}},t));}}
      $('ins-search').value='';doSearch('');
    };
    navBtns.forEach(b=>{
      b.addEventListener('click',()=>setView(b.getAttribute('data-view')));
      b.addEventListener('mouseenter',()=>{if(!b._active)b.style.background='#F3F0EA';});
      b.addEventListener('mouseleave',()=>{if(!b._active)b.style.background='transparent';});
    });
    document.querySelectorAll('[data-goto]').forEach(el=>el.addEventListener('click',()=>setView(el.getAttribute('data-goto'))));

    // ── search (filters visible cards in active view) ─────────
    const doSearch=q=>{
      q=(q||'').trim().toLowerCase();
      const active=VIEWS.find(x=>{const s=$('view-'+x);return s&&s.style.display!=='none';});
      const grid=active==='inicio'?gi:active==='explorar'?ge:null;
      if(!grid)return;
      let shown=0;
      Array.from(grid.children).forEach(c=>{
        const passFilter=active==='explorar'?(activeFilter==='Todos'||c.getAttribute('data-tag')===activeFilter):(active==='inicio'?(activeCat==='Todos'||c.getAttribute('data-cat')===activeCat):true);
        const passQ=!q||(c.getAttribute('data-title')||'').includes(q);
        const ok=passFilter&&passQ;c.style.display=ok?'inline-block':'none';if(ok)shown++;
      });
      if(active==='explorar')$('explorar-empty').style.display=shown?'none':'block';
    };
    $('ins-search').addEventListener('input',e=>doSearch(e.target.value));

    setView('inicio');
});
</script>
</body>
